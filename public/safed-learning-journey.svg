<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="500" height="500" fill="#f8fafc"/>

  <!-- Individual Level -->
  <g transform="translate(50, 100)">
    <circle cx="50" cy="50" r="40" fill="#2563eb" opacity="0.8"/>
    <circle cx="50" cy="35" r="8" fill="#fff"/>
    <path d="M35 60 Q50 75 65 60" stroke="#fff" stroke-width="2" fill="none"/>
    <text x="50" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2563eb">Individual</text>
    <text x="50" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Self-paced learning</text>
  </g>

  <!-- Arrow to Group -->
  <path d="M140 150 L180 150 L175 145 M180 150 L175 155" stroke="#64748b" stroke-width="2" fill="none"/>

  <!-- Group Level -->
  <g transform="translate(200, 80)">
    <circle cx="30" cy="40" r="20" fill="#f97316" opacity="0.8"/>
    <circle cx="70" cy="40" r="20" fill="#f97316" opacity="0.8"/>
    <circle cx="50" cy="70" r="20" fill="#f97316" opacity="0.8"/>
    <circle cx="30" cy="35" r="3" fill="#fff"/>
    <circle cx="70" cy="35" r="3" fill="#fff"/>
    <circle cx="50" cy="65" r="3" fill="#fff"/>
    <text x="50" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f97316">Group</text>
    <text x="50" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Collaborative learning</text>
  </g>

  <!-- Arrow to Team -->
  <path d="M320 150 L360 150 L355 145 M360 150 L355 155" stroke="#64748b" stroke-width="2" fill="none"/>

  <!-- Team Level -->
  <g transform="translate(380, 60)">
    <circle cx="25" cy="35" r="15" fill="#2563eb" opacity="0.8"/>
    <circle cx="55" cy="35" r="15" fill="#2563eb" opacity="0.8"/>
    <circle cx="40" cy="60" r="15" fill="#2563eb" opacity="0.8"/>
    <circle cx="25" cy="85" r="15" fill="#2563eb" opacity="0.8"/>
    <circle cx="55" cy="85" r="15" fill="#2563eb" opacity="0.8"/>
    <circle cx="25" cy="32" r="2" fill="#fff"/>
    <circle cx="55" cy="32" r="2" fill="#fff"/>
    <circle cx="40" cy="57" r="2" fill="#fff"/>
    <circle cx="25" cy="82" r="2" fill="#fff"/>
    <circle cx="55" cy="82" r="2" fill="#fff"/>
    <text x="40" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2563eb">Team</text>
    <text x="40" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Advanced collaboration</text>
  </g>

  <!-- Platform title -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2563eb">SafED Learning Journey</text>
</svg>